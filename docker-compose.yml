version: "3.8"

services:
  avaliarh:
    image: detinoca/avaliarh:latest
    ports:
      - "8088:80"
    networks:
      - digital_network
    volumes:
      - storage:/var/www/html/storage
      - cache:/var/www/html/bootstrap/cache
    environment:
      APP_NAME: avaliarh
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      TZ: America/Rio_Branco

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  storage:
  cache:

networks:
  digital_network:
    external: true
